frr defaults traditional
hostname ec2-b
log syslog informational
service integrated-vtysh-config

!
! ==================================================
! BGP (Standby)
! ==================================================
router bgp 65000
 bgp router-id 54.150.56.237
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 no bgp default ipv6-unicast
 bgp graceful-restart
 timers bgp 10 30

 !
 ! --- Tunnel1 (xfrm101) ---
 !
 neighbor 169.254.208.49 remote-as 64512
 neighbor 169.254.208.49 update-source 169.254.208.50
 neighbor 169.254.208.49 description AWS-VPN-Tunnel-1
 neighbor 169.254.208.49 timers 10 30
 neighbor 169.254.208.49 timers connect 10

 !
 ! --- Tunnel2 (xfrm102) ---
 !
 neighbor 169.254.125.245 remote-as 64512
 neighbor 169.254.125.245 update-source 169.254.125.246
 neighbor 169.254.125.245 description AWS-VPN-Tunnel-2
 neighbor 169.254.125.245 timers 10 30
 neighbor 169.254.125.245 timers connect 10

 !
 ! --------------------------
 ! IPv4 Unicast
 ! --------------------------
 address-family ipv4 unicast

  !
  ! ★ Standby も 192.168.0.0/16 を広告する（Active障害時に経路が消えない）
  !
  network 192.168.0.0/16

  !
  ! --- Tunnel1 ---
  !
  neighbor 169.254.208.49 activate
  neighbor 169.254.208.49 soft-reconfiguration inbound
  neighbor 169.254.208.49 route-map FROM-AWS in
  neighbor 169.254.208.49 route-map TO-AWS out

  !
  ! --- Tunnel2 ---
  !
  neighbor 169.254.125.245 activate
  neighbor 169.254.125.245 soft-reconfiguration inbound
  neighbor 169.254.125.245 route-map FROM-AWS in
  neighbor 169.254.125.245 route-map TO-AWS out

 exit-address-family
exit

!
! ==================================================
! Static route (Summary)
! ==================================================
!
! ★ 192.168.0.0/16 を RIB に存在させるためのサマリ用 Null0
!
ip route 192.168.0.0/16 Null0

!
! ==================================================
! Prefix-lists (Outbound control)
! ==================================================
!
! ★ Standby でも「広告して良いのは 192.168.0.0/16 のみ」
!
ip prefix-list ADVERTISE-TO-AWS seq 10 permit 192.168.0.0/16
ip prefix-list ADVERTISE-TO-AWS seq 100 deny 0.0.0.0/0 le 32

!
! ==================================================
! Route-maps
! ==================================================
!
! ★ 受信側は基本 permit（Active と同じ：172.16/16 を受信）
!
route-map FROM-AWS permit 10
exit

!
! ★ Standby の送信側：許可リストに一致するものだけ出し、AS-PATH を伸ばす
!    → 通常時は Active(AS-PATH短) が選ばれ、Active障害時は Standby が採用される
!
route-map TO-AWS permit 10
 match ip address prefix-list ADVERTISE-TO-AWS
 set as-path prepend 65000 65000 65000
exit

!
! それ以外は暗黙 deny（= 192.168/16 以外は送らない）
!

!
! ==================================================
! VTY
! ==================================================
line vty
 exec-timeout 0 0
exit